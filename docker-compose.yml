services:
  integrahub:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - integrahub_data:/app/data
    environment:
      - JWT_SECRET=change-this-in-production
      - DEBUG=true
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  integrahub_data:
